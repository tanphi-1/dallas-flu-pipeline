id: run_dbt
namespace: dallas.flu
description: Run dbt models and tests to build mart tables

triggers:
  - id: after_load
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionFlowCondition
        namespace: dallas.flu
        flowId: parse_and_load
      - type: io.kestra.plugin.core.condition.ExecutionStatusCondition
        in: [SUCCESS, WARNING]

tasks:
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export PATH=$PATH:/home/kestra/.local/bin
      - export SUPABASE_DB_URL=$SECRET_SUPABASE_DB_URL
      - export SUPABASE_DB_HOST=$SECRET_SUPABASE_DB_HOST
      - export SUPABASE_DB_PASSWORD=$SECRET_SUPABASE_DB_PASSWORD
      - export SUPABASE_PROJECT_REF=$SECRET_SUPABASE_PROJECT_REF
      - pip install dbt-core dbt-postgres -q
      - rm -rf /tmp/dallas-flu-pipeline-main
      - curl -sL https://github.com/tanphi-1/dallas-flu-pipeline/archive/refs/heads/main.tar.gz | tar xz -C /tmp
      - cd /tmp/dallas-flu-pipeline-main/dbt && dbt run --profiles-dir . --project-dir .

  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export PATH=$PATH:/home/kestra/.local/bin
      - export SUPABASE_DB_URL=$SECRET_SUPABASE_DB_URL
      - export SUPABASE_DB_HOST=$SECRET_SUPABASE_DB_HOST
      - export SUPABASE_DB_PASSWORD=$SECRET_SUPABASE_DB_PASSWORD
      - export SUPABASE_PROJECT_REF=$SECRET_SUPABASE_PROJECT_REF
      - cd /tmp/dallas-flu-pipeline-main/dbt && dbt test --profiles-dir . --project-dir .
