id: run_dbt
namespace: dallas.flu
description: Run dbt models and tests to build mart tables

triggers:
  - id: after_load
    type: io.kestra.plugin.core.trigger.Flow
    conditions:
      - type: io.kestra.plugin.core.condition.ExecutionFlowCondition
        namespace: dallas.flu
        flowId: parse_and_load
      - type: io.kestra.plugin.core.condition.ExecutionStatusCondition
        in: [SUCCESS]

tasks:
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      SUPABASE_DB_URL: '{{ secret("SUPABASE_DB_URL") }}'
      SUPABASE_DB_HOST: '{{ secret("SUPABASE_DB_HOST") }}'
      SUPABASE_DB_PASSWORD: '{{ secret("SUPABASE_DB_PASSWORD") }}'
      SUPABASE_PROJECT_REF: '{{ secret("SUPABASE_PROJECT_REF") }}'
    beforeCommands:
      - pip install dbt-core dbt-postgres -q
    commands:
      - git clone https://github.com/tanphi-1/dallas-flu-pipeline.git /tmp/repo
      - cd /tmp/repo/dbt && dbt run --profiles-dir . --project-dir .

  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      SUPABASE_DB_URL: '{{ secret("SUPABASE_DB_URL") }}'
      SUPABASE_DB_HOST: '{{ secret("SUPABASE_DB_HOST") }}'
      SUPABASE_DB_PASSWORD: '{{ secret("SUPABASE_DB_PASSWORD") }}'
      SUPABASE_PROJECT_REF: '{{ secret("SUPABASE_PROJECT_REF") }}'
    commands:
      - cd /tmp/repo/dbt && dbt test --profiles-dir . --project-dir .
