id: scrape_all_pdfs
namespace: dallas.flu
description: Scrape DCHHS and DSHS websites, upload PDFs to Supabase Storage

triggers:
  - id: weekly_friday
    type: io.kestra.plugin.core.trigger.Schedule
    cron: '0 9 * * 5'

tasks:
  - id: scrape_dchhs
    type: io.kestra.plugin.scripts.python.Script
    env:
      SUPABASE_URL: '{{ secret("SUPABASE_URL") }}'
      SUPABASE_KEY: '{{ secret("SUPABASE_KEY") }}'
    beforeCommands:
      - pip install supabase -q
    script: |
      import os, re, subprocess
      from supabase import create_client

      supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
      BUCKET   = 'flu-pdfs-dchhs'
      BASE_URL = 'https://www.dallascounty.org'
      INDEX_URL = BASE_URL + '/departments/dchhs/data-reports/influenza-surveillance.php'
      SEASONS  = ['2023', '2024', '2025']

      def curl_get(url):
          r = subprocess.run(['curl', '-sL', url], capture_output=True, timeout=60)
          r.check_returncode()
          return r.stdout

      def list_existing():
          try:
              return {f['name'] for f in supabase.storage.from_(BUCKET).list()}
          except:
              return set()

      def get_pdf_links():
          html = curl_get(INDEX_URL).decode('utf-8', errors='replace')
          pattern = re.compile(
              r'/Assets/uploads/docs/hhs/influenza-surveillance/(\d{4})/[^"]+\.pdf',
              re.IGNORECASE)
          seen, results = set(), []
          for m in re.finditer(pattern, html):
              path = m.group(0)
              if '&quot;' in path or 'columnData' in path:
                  continue
              year = m.group(1)
              if year in SEASONS and path not in seen:
                  seen.add(path)
                  results.append((year, BASE_URL + path))
          return results

      existing = list_existing()
      links = get_pdf_links()
      print(f'Found {len(links)} DCHHS PDF links')
      uploaded = 0
      for year, url in links:
          filename = f"{year}_{url.split('/')[-1]}"
          if filename in existing:
              print(f'  Skip (exists): {filename}')
              continue
          try:
              content = curl_get(url)
              supabase.storage.from_(BUCKET).upload(
                  path=filename, file=content,
                  file_options={'content-type':'application/pdf','upsert':'true'})
              print(f'  Uploaded: {filename}')
              uploaded += 1
          except Exception as e:
              print(f'  ERROR {filename}: {e}')
      print(f'Done. Uploaded: {uploaded}')

  - id: scrape_dshs
    type: io.kestra.plugin.scripts.python.Script
    env:
      SUPABASE_URL: '{{ secret("SUPABASE_URL") }}'
      SUPABASE_KEY: '{{ secret("SUPABASE_KEY") }}'
    beforeCommands:
      - pip install supabase -q
    script: |
      import os, re, subprocess
      from supabase import create_client

      supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
      BUCKET   = 'flu-pdfs-dshs'
      BASE     = 'https://www.dshs.texas.gov'
      INDEX    = BASE + '/texas-respiratory-virus-surveillance-report'
      YEAR_FOLDERS = ['2024', '2025']

      def curl_get(url):
          r = subprocess.run(['curl', '-sL', url], capture_output=True, timeout=60)
          r.check_returncode()
          return r.stdout

      def list_existing():
          try: return {f['name'] for f in supabase.storage.from_(BUCKET).list()}
          except: return set()

      def extract_week(path):
          basename = path.split('/')[-1].lower()
          m = re.search(r'(\d{4})-?week-?(\d{1,2})', basename)
          if m: return int(m.group(1)), int(m.group(2))
          m = re.search(r'(\d{4})week(\d{1,2})trvs', basename)
          if m: return int(m.group(1)), int(m.group(2))
          m = re.search(r'(\d{4})\.week(\d{1,2})\.', basename)
          if m: return int(m.group(1)), int(m.group(2))
          m = re.search(r'(\d{4})-wee(\d{1,2})-', basename)
          if m: return int(m.group(1)), int(m.group(2))
          return None, None

      def get_pdf_links():
          html = curl_get(INDEX).decode('utf-8', errors='replace')
          pattern = re.compile(
              r'/sites/default/files/IDCU/disease/respiratory_virus_surveillance/'
              r'(\d{4})/[^"]+\.pdf', re.IGNORECASE)
          seen, results = set(), []
          for m in re.finditer(pattern, html):
              path = m.group(0)
              year_folder = m.group(1)
              if year_folder not in YEAR_FOLDERS or path in seen:
                  continue
              if 'faq' in path.lower():
                  continue
              seen.add(path)
              year, week = extract_week(path)
              if year and week:
                  results.append((year, week, BASE + path))
              else:
                  print(f'  WARN: could not parse week from: {path}')
          return results

      existing = list_existing()
      links = get_pdf_links()
      print(f'Found {len(links)} DSHS PDF links')
      uploaded = 0
      for year, week, url in sorted(links):
          filename = f'{year}_week{week:02d}_dshs.pdf'
          if filename in existing:
              print(f'  Skip: {filename}')
              continue
          try:
              content = curl_get(url)
              supabase.storage.from_(BUCKET).upload(
                  path=filename, file=content,
                  file_options={'content-type':'application/pdf','upsert':'true'})
              print(f'  Uploaded: {filename}')
              uploaded += 1
          except Exception as e:
              print(f'  ERROR {filename}: {e}')
      print(f'Done. Uploaded: {uploaded}')
