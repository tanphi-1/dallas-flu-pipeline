id: scrape_all_pdfs
namespace: dallas.flu
description: Scrape DCHHS and DSHS websites, upload PDFs to Supabase Storage

triggers:
  - id: weekly_friday
    type: io.kestra.plugin.core.trigger.Schedule
    cron: '0 9 * * 5'

tasks:
  - id: scrape_dchhs
    type: io.kestra.plugin.scripts.python.Script
    env:
      SUPABASE_URL: '{{ secret("SUPABASE_URL") }}'
      SUPABASE_KEY: '{{ secret("SUPABASE_KEY") }}'
    beforeCommands:
      - pip install requests supabase python-dotenv -q
    script: |
      import os, re, requests
      from supabase import create_client

      supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
      BUCKET   = 'flu-pdfs-dchhs'
      BASE_URL = 'https://www.dallascounty.org'
      INDEX_URL = BASE_URL + '/departments/dchhs/data-reports/influenza-surveillance.php'
      SEASONS  = ['2023', '2024', '2025']

      def list_existing():
          try:
              return {f['name'] for f in supabase.storage.from_(BUCKET).list()}
          except:
              return set()

      def get_pdf_links(session):
          resp = session.get(INDEX_URL, timeout=30)
          pattern = re.compile(
              r'/Assets/uploads/docs/hhs/influenza-surveillance/(\d{4})/[^"]+\.pdf',
              re.IGNORECASE)
          seen, results = set(), []
          for m in re.finditer(pattern, resp.text):
              year = m.group(1)
              if year in SEASONS and m.group(0) not in seen:
                  seen.add(m.group(0))
                  results.append((year, BASE_URL + m.group(0)))
          return results

      existing = list_existing()
      session  = requests.Session()
      links    = get_pdf_links(session)
      print(f'Found {len(links)} DCHHS PDF links')
      uploaded = 0
      for year, url in links:
          filename = f"{year}_{url.split('/')[-1]}"
          if filename in existing:
              print(f'  Skip (exists): {filename}')
              continue
          try:
              content = session.get(url, timeout=30).content
              supabase.storage.from_(BUCKET).upload(
                  path=filename, file=content,
                  file_options={'content-type':'application/pdf','upsert':'true'})
              print(f'  Uploaded: {filename}')
              uploaded += 1
          except Exception as e:
              print(f'  ERROR {filename}: {e}')
      print(f'Done. Uploaded: {uploaded}')

  - id: scrape_dshs
    type: io.kestra.plugin.scripts.python.Script
    env:
      SUPABASE_URL: '{{ secret("SUPABASE_URL") }}'
      SUPABASE_KEY: '{{ secret("SUPABASE_KEY") }}'
    beforeCommands:
      - pip install requests supabase python-dotenv -q
    script: |
      import os, requests
      from supabase import create_client

      supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
      BUCKET   = 'flu-pdfs-dshs'
      BASE     = 'https://www.dshs.texas.gov/sites/default/files/IDCU/disease/respiratory_virus_surveillance'

      WEEKS_TO_FETCH = [
          *[(2023, w) for w in range(40, 53)],
          *[(2024, w) for w in range(1,  21)],
          *[(2024, w) for w in range(40, 53)],
          *[(2025, w) for w in range(1,  21)],
      ]

      def list_existing():
          try: return {f['name'] for f in supabase.storage.from_(BUCKET).list()}
          except: return set()

      def build_url(year, week):
          return f'{BASE}/{year}/{year}-week{week:02d}-trvsreport.pdf'

      existing = list_existing()
      session  = requests.Session()
      uploaded, missing = 0, []
      for year, week in WEEKS_TO_FETCH:
          filename = f'{year}_week{week:02d}_dshs.pdf'
          if filename in existing:
              print(f'  Skip: {filename}'); continue
          url  = build_url(year, week)
          resp = session.get(url, timeout=30)
          if resp.status_code == 404:
              missing.append(filename); continue
          supabase.storage.from_(BUCKET).upload(
              path=filename, file=resp.content,
              file_options={'content-type':'application/pdf','upsert':'true'})
          print(f'  Uploaded: {filename}')
          uploaded += 1
      print(f'Done. Uploaded: {uploaded}. Missing/404: {len(missing)}')
      if missing: print('Missing:', missing)
